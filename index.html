<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG.bond-Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="p-6 flex justify-between items-center max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-green-400">GG.bond-Music</h1>
        <button onclick="toggleLang()" class="bg-slate-700 px-4 py-2 rounded-lg hover:bg-slate-600" id="langBtn">中/EN</button>
    </nav>

    <div class="max-w-4xl mx-auto p-6" id="app">
        <div class="flex gap-2 mb-8">
            <input id="query" class="flex-1 p-3 rounded-lg text-black outline-none" placeholder="搜索歌曲、歌手...">
            <button onclick="search()" class="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-500">搜索</button>
        </div>
        <div id="results" class="grid gap-4"></div>
    </div>

    <script>
        let isChinese = true;
        
        function toggleLang() {
            isChinese = !isChinese;
            document.getElementById('langBtn').innerText = isChinese ? "中/EN" : "EN/中";
            alert(isChinese ? "已切换至中文" : "Switched to English");
        }

        // 搜索歌曲
        async function search() {
            const query = document.getElementById('query').value;
            const resDiv = document.getElementById('results');
            if(!query) return;
            
            resDiv.innerHTML = isChinese ? "正在搜索..." : "Searching...";
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=10`);
            const data = await response.json();
            
            resDiv.innerHTML = data.results.map(t => `
                <div class="bg-slate-800 p-4 rounded-xl flex items-center gap-4 border border-slate-700 cursor-pointer hover:border-green-500" 
                     onclick="showDetail('${encodeURIComponent(JSON.stringify(t))}')">
                    <img src="${t.artworkUrl100}" class="w-16 h-16 rounded-md">
                    <div>
                        <p class="font-bold">${t.trackName}</p>
                        <p class="text-sm text-slate-400">${t.artistName}</p>
                    </div>
                </div>
            `).join('');
        }

        // 显示详情及调用 DeepSeek
        function showDetail(trackData) {
            const t = JSON.parse(decodeURIComponent(trackData));
            document.getElementById('app').innerHTML = `
                <button onclick="location.reload()" class="mb-4 text-green-400">← ${isChinese ? '返回搜索' : 'Back'}</button>
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700">
                    <img src="${t.artworkUrl100.replace('100x100', '600x600')}" class="w-64 h-64 rounded-lg mx-auto mb-6">
                    <h2 class="text-3xl font-bold mb-2">${t.trackName}</h2>
                    <p class="text-xl text-green-400 mb-4">${t.artistName}</p>
                    <audio src="${t.previewUrl}" controls class="w-full mb-6"></audio>
                    
                    <button onclick="getArtistBio('${t.artistName}')" class="bg-blue-600 px-6 py-2 rounded-lg hover:bg-blue-500 w-full">
                        ${isChinese ? '查看歌手背景 (AI)' : 'View Artist Bio (AI)'}
                    </button>
                    <div id="bio-content" class="mt-6 text-slate-300 italic p-4 bg-slate-900 rounded-lg"></div>
                </div>
            `;
        }

        // 调用后端 API 获取 AI 简介
        async function getArtistBio(artistName) {
            const bioDiv = document.getElementById('bio-content');
            bioDiv.innerText = isChinese ? "AI 正在加载背景..." : "AI is loading bio...";
            
            try {
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: `请简要介绍歌手：${artistName}` })
                });
                const data = await response.json();
                bioDiv.innerText = data.choices[0].message.content;
            } catch (e) {
                bioDiv.innerText = isChinese ? "AI 服务暂不可用。" : "AI service unavailable.";
            }
        }
    </script>
</body>
</html>
